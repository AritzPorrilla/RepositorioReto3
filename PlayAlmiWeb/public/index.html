<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayAlmi | Mensajes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>

  <main class="layout">
    <section class="panel intro reveal">
      <p class="eyebrow">MongoDB + Node.js</p>
      <h1>Tablero de mensajes PlayAlmi</h1>
      <p class="subtitle">Escribe un mensaje y guárdalo en la base de datos. La lista se actualiza desde la API en vivo.</p>
      <div class="status" id="statusApi">Conectando API...</div>
    </section>

    <section class="panel reveal delay-1">
      <h2>Nuevo mensaje</h2>
      <form id="formMensaje" class="form">
        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" type="text" placeholder="Tu nombre" required />

        <label for="contenido">Mensaje</label>
        <textarea id="contenido" name="contenido" rows="4" placeholder="Escribe algo para guardar en MongoDB" required></textarea>

        <button type="submit">Guardar mensaje</button>
      </form>
      <p class="feedback" id="feedback"></p>
    </section>

    <section class="panel reveal delay-2">
      <div class="header-lista">
        <h2>Mensajes guardados</h2>
        <button id="btnRecargar" class="ghost">Recargar</button>
      </div>
      <ul id="listaMensajes" class="lista"></ul>
    </section>
  </main>

  <script src="./client.js" defer></script>
</body>
</html>
