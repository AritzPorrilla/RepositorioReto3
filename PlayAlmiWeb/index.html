<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>PlayAlmi | Zombie Ranking</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Chakra+Petch:wght@400;500;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
	<div class="fog fog-a" aria-hidden="true"></div>
	<div class="fog fog-b" aria-hidden="true"></div>
	<a href="./perfil.html" class="top-corner-link ghost top-corner-avatar-link" aria-label="Ir a mi perfil">
		<img id="nav-perfil-foto" class="top-corner-avatar" src="https://placehold.co/96x96/1b2819/d7ffc4?text=Perfil" alt="Foto de perfil" />
	</a>

	<main class="layout">
		<section class="hero panel reveal">
			<p class="eyebrow">Night Event - Zombie Siege</p>
			<h1>Ranking de Supervivientes</h1>
			<p class="subtitle">Clasificacion en vivo de jugadores de PlayAlmi.</p>
			<p class="status" id="status-text">Conectando...</p>
		</section>

		<section class="panel ranking reveal delay-1">
			<div style="display:flex; justify-content:space-between; gap:0.8rem; align-items:center; flex-wrap:wrap;">
				<h2 style="margin:0;">Top jugadores</h2>
				<div style="display:flex; gap:0.55rem; align-items:center; flex-wrap:wrap;">
					<button id="btn-logout" class="ghost" type="button">Cerrar sesion</button>
					<button id="btn-ver-mas" class="ghost" type="button" style="display:none;">Ver mas</button>
					<button id="btn-recargar" type="button">Recargar ranking</button>
				</div>
			</div>
			<p id="sesion-activa" style="margin:0.45rem 0 0.25rem; color:#d7ffc4; font-size:0.92rem;">Sesion activa: -</p>
			<div style="display:flex; gap:0.65rem; flex-wrap:wrap; margin:0.25rem 0 0.4rem; align-items:end;">
				<div style="min-width:220px; flex:1 1 280px;">
					<label for="busqueda-nombre" style="display:block; margin-bottom:0.3rem; color:#a7b8a1; font-size:0.9rem;">Buscar por nombre</label>
					<input id="busqueda-nombre" type="text" placeholder="Ej: survivor" />
				</div>
				<div style="min-width:220px; flex:1 1 280px;">
					<label for="orden-ranking" style="display:block; margin-bottom:0.3rem; color:#a7b8a1; font-size:0.9rem;">Ordenar ranking</label>
					<select id="orden-ranking" style="width:100%; border:1px solid rgba(162, 255, 117, 0.25); border-radius:10px; background:rgba(19, 24, 18, 0.9); color:#edf7e8; padding:0.65rem 0.75rem; font:inherit;">
						<option value="puntos">Por puntos (mayor a menor)</option>
						<option value="kills">Por kills (mayor a menor)</option>
						<option value="antiguedad">Por antiguedad (mas antigua primero)</option>
					</select>
				</div>
			</div>
			<p id="resumen-ranking" style="margin:0.45rem 0 0.25rem; color:#a7b8a1; font-size:0.92rem;">Mostrando Top 10 por puntos.</p>

			<div id="estado">
				<p>Cargando datos del bunker...</p>
			</div>

			<div id="contenido" style="display:none;">
				<table>
					<thead>
						<tr>
							<th>#</th>
							<th>Foto</th>
							<th>Usuario</th>
							<th>Kills</th>
							<th>Puntos</th>
							<th>Fecha registro</th>
						</tr>
					</thead>
					<tbody id="tabla-body"></tbody>
				</table>
			</div>
		</section>
	</main>

	<footer class="panel" style="width:min(1100px,94vw); margin:0 auto 1.2rem; display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
		<span>Total jugadores: <strong id="total-usuarios">0</strong></span>
	</footer>

	<script src="./js/proxyApi.js"></script>
	<script src="./js/cargarUsers.js"></script>
</body>
</html>
