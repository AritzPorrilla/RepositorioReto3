<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayAlmi | Usuarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>

  <main class="layout">
    <section class="panel intro reveal">
      <p class="eyebrow">Web en 5500 + API en 8080</p>
      <h1>Usuarios PlayAlmi</h1>
      <p class="subtitle">La web consulta únicamente la ruta <strong>/api/users</strong> del backend.</p>
      <div class="status" id="statusApi">Conectando API...</div>
    </section>

    <section class="panel reveal delay-2">
      <div class="header-lista">
        <h2>Usuarios guardados</h2>
        <button id="btnRecargar" class="ghost">Recargar</button>
      </div>
      <p class="feedback" id="feedback"></p>
      <ul id="listaUsuarios" class="lista"></ul>
    </section>
  </main>

  <script src="./client.js" defer></script>
</body>
</html>
