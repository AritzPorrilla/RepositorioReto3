<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayAlmi — Panel de Jugadores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #050f06;
            --panel:     #1e200a;
            --border:    #1b3a0d;
            --accent:    #09ff00;
            --accent2:   #ff3d71;
            --gold:      #ffd600;
            --text:      #c8e6f0;
            --muted:     #4a7a8a;
            --row-hover: #0d2535;
        }
 
        * { margin: 0; padding: 0; box-sizing: border-box; }
 
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            min-height: 100vh;
            overflow-x: hidden;
        }
 
        /* ─── GRID BG ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
 
        /* ─── HEADER ─── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 48px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(0,229,255,.04) 0%, transparent 100%);
        }
 
        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.7rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0,229,255,.6);
        }
 
        .logo span { color: var(--accent2); }
 
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .85rem;
            letter-spacing: 1px;
            color: var(--muted);
            text-transform: uppercase;
        }
 
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #2a4a5a;
            transition: background .4s;
        }
        .dot.online  { background: #00e676; box-shadow: 0 0 8px #00e676; }
        .dot.offline { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
 
        /* ─── MAIN ─── */
        main { padding: 40px 48px; max-width: 1400px; margin: 0 auto; }
 
        /* ─── STATS BAR ─── */
        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }
 
        .stat-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-top: 2px solid var(--accent);
            padding: 16px 28px;
            flex: 1;
            min-width: 160px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity .4s, transform .4s;
        }
        .stat-card.visible { opacity: 1; transform: none; }
 
        .stat-label {
            font-size: .75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
 
        .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }
 
        /* ─── CONTROLS ─── */
        .controls {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            align-items: center;
            flex-wrap: wrap;
        }
 
        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 220px;
        }
 
        .search-wrap::before {
            content: '⌕';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1.2rem;
        }
 
        input[type="text"] {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            padding: 10px 14px 10px 38px;
            outline: none;
            transition: border .2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        input[type="text"]::placeholder { color: var(--muted); }
 
        .btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Rajdhani', sans-serif;
            font-size: .9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 10px 22px;
            cursor: pointer;
            transition: background .2s, color .2s;
        }
        .btn:hover { background: var(--accent); color: var(--bg); }
        .btn:active { transform: scale(.97); }
 
        .btn-danger {
            border-color: var(--accent2);
            color: var(--accent2);
        }
        .btn-danger:hover { background: var(--accent2); color: #fff; }
 
        /* ─── TABLE ─── */
        .table-wrap {
            border: 1px solid var(--border);
            overflow-x: auto;
        }
 
        table {
            width: 100%;
            border-collapse: collapse;
        }
 
        thead tr {
            background: #060e16;
            border-bottom: 2px solid var(--accent);
        }
 
        th {
            font-family: 'Orbitron', monospace;
            font-size: .7rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            padding: 14px 20px;
            text-align: left;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        th:hover { color: #fff; }
        th .sort-icon { opacity: .4; margin-left: 4px; }
        th.sorted .sort-icon { opacity: 1; }
 
        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .15s;
        }
        tbody tr:hover { background: var(--row-hover); }
 
        td {
            padding: 14px 20px;
            font-size: .95rem;
            vertical-align: middle;
        }
 
        /* avatar */
        .avatar {
            width: 38px; height: 38px;
            border-radius: 0;
            border: 1px solid var(--border);
            object-fit: cover;
            display: block;
        }
        .avatar-placeholder {
            width: 38px; height: 38px;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--muted);
            border: 1px solid var(--border);
        }
 
        /* kills badge */
        .kills-badge {
            display: inline-block;
            background: rgba(255,61,113,.12);
            border: 1px solid rgba(255,61,113,.4);
            color: var(--accent2);
            font-family: 'Orbitron', monospace;
            font-size: .72rem;
            padding: 3px 10px;
            letter-spacing: 1px;
        }
 
        /* puntos */
        .puntos-val {
            font-family: 'Orbitron', monospace;
            font-size: .9rem;
            color: var(--gold);
        }
 
        /* rank */
        .rank-num {
            font-family: 'Orbitron', monospace;
            font-size: .85rem;
            color: var(--muted);
        }
        .rank-num.top1 { color: var(--gold); }
        .rank-num.top2 { color: #b0bec5; }
        .rank-num.top3 { color: #bf8b57; }
 
        /* actions */
        .action-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: .75rem;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            padding: 4px 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: border-color .2s, color .2s;
            margin-right: 6px;
        }
        .action-btn:hover { border-color: var(--accent); color: var(--accent); }
        .action-btn.del:hover { border-color: var(--accent2); color: var(--accent2); }
 
        /* ─── EMPTY / LOADING ─── */
        .state-row td {
            text-align: center;
            padding: 60px;
            color: var(--muted);
            font-size: 1rem;
            letter-spacing: 1px;
        }
 
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
 
        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
 
        .modal {
            background: var(--panel);
            border: 1px solid var(--accent);
            width: 480px;
            max-width: 95vw;
            padding: 32px;
            transform: translateY(20px);
            transition: transform .2s;
        }
        .modal-overlay.open .modal { transform: none; }
 
        .modal h2 {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 24px;
            text-transform: uppercase;
        }
 
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-grid .full { grid-column: 1/-1; }
 
        .field label {
            display: block;
            font-size: .75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
 
        .field input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: .95rem;
            padding: 9px 12px;
            outline: none;
            transition: border .2s;
        }
        .field input:focus { border-color: var(--accent); }
 
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }
 
        /* ─── TOAST ─── */
        #toast {
            position: fixed;
            bottom: 32px; right: 32px;
            background: var(--panel);
            border-left: 3px solid var(--accent);
            padding: 14px 24px;
            font-size: .9rem;
            letter-spacing: .5px;
            opacity: 0;
            transform: translateX(20px);
            transition: opacity .3s, transform .3s;
            z-index: 200;
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: none; }
        #toast.error { border-left-color: var(--accent2); }
 
        /* ─── RESPONSIVE ─── */
        @media (max-width: 700px) {
            header, main { padding: 20px; }
            .logo { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
 
<header>
    <div class="logo">PLAY<span>ALMI</span></div>
    <div class="status-badge">
        <div class="dot" id="dot"></div>
        <span id="api-status">Conectando...</span>
    </div>
</header>
 
<main>
    <div class="stats-row" id="stats-row">
        <div class="stat-card" id="s-total">
            <div class="stat-label">Jugadores</div>
            <div class="stat-value" id="v-total">—</div>
        </div>
        <div class="stat-card" id="s-kills">
            <div class="stat-label">Kills (suma)</div>
            <div class="stat-value" id="v-kills">—</div>
        </div>
        <div class="stat-card" id="s-pts">
            <div class="stat-label">Puntos máx.</div>
            <div class="stat-value" id="v-pts">—</div>
        </div>
        <div class="stat-card" id="s-top">
            <div class="stat-label">Top jugador</div>
            <div class="stat-value" id="v-top" style="font-size:1.1rem">—</div>
        </div>
    </div>
 
    <div class="controls">
        <div class="search-wrap">
            <input type="text" id="search" placeholder="Buscar jugador...">
        </div>
        <button class="btn" onclick="openModal()">+ Nuevo jugador</button>
        <button class="btn" onclick="loadUsers()">↻ Recargar</button>
    </div>
 
    <div class="table-wrap">
        <table id="user-table">
            <thead>
                <tr>
                    <th onclick="sortBy('rank')">#  <span class="sort-icon">↕</span></th>
                    <th>Avatar</th>
                    <th onclick="sortBy('username')">Usuario <span class="sort-icon">↕</span></th>
                    <th onclick="sortBy('puntos')">Puntos <span class="sort-icon">↕</span></th>
                    <th onclick="sortBy('kills')">Kills <span class="sort-icon">↕</span></th>
                    <th onclick="sortBy('fecha')">Registro <span class="sort-icon">↕</span></th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="user-tbody">
                <tr class="state-row">
                    <td colspan="7"><span class="spinner"></span>Cargando jugadores...</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
 
<!-- Modal nuevo/editar usuario -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal">
        <h2 id="modal-title">Nuevo Jugador</h2>
        <div class="form-grid">
            <div class="field full">
                <label>Username *</label>
                <input type="text" id="f-username" placeholder="nombre_jugador">
            </div>
            <div class="field">
                <label>Contraseña *</label>
                <input type="text" id="f-password" placeholder="••••••••">
            </div>
            <div class="field">
                <label>Puntos *</label>
                <input type="number" id="f-puntos" placeholder="0">
            </div>
            <div class="field">
                <label>Kills</label>
                <input type="text" id="f-kills" placeholder="0">
            </div>
            <div class="field full">
                <label>URL foto perfil</label>
                <input type="text" id="f-foto" placeholder="https://...">
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-danger" onclick="closeModal()">Cancelar</button>
            <button class="btn" id="modal-save-btn" onclick="saveUser()">Guardar</button>
        </div>
    </div>
</div>
 
<!-- Toast -->
<div id="toast"></div>
 
<script>
    const API = 'http://20.203.222.95:8080/api';
    let allUsers  = [];
    let editingId = null;
    let sortField = 'puntos';
    let sortAsc   = false;
 
    // ─── FETCH ───────────────────────────────────────────────────
    async function loadUsers() {
        setTbody(`<tr class="state-row"><td colspan="7"><span class="spinner"></span>Cargando...</td></tr>`);
        try {
            const res  = await fetch(`${API}/users`);
            const json = await res.json();
            allUsers = json.data || [];
            setApiStatus(true);
            updateStats();
            renderTable();
        } catch (e) {
            setApiStatus(false);
            setTbody(`<tr class="state-row"><td colspan="7">⚠ No se pudo conectar con la API</td></tr>`);
        }
    }
 
    // ─── RENDER ──────────────────────────────────────────────────
    function renderTable() {
        const q       = document.getElementById('search').value.toLowerCase();
        let filtered  = allUsers.filter(u => u.username.toLowerCase().includes(q));
        filtered      = sortUsers(filtered);
 
        if (!filtered.length) {
            setTbody(`<tr class="state-row"><td colspan="7">Sin resultados</td></tr>`);
            return;
        }
 
        const rows = filtered.map((u, i) => {
            const rank  = i + 1;
            const cls   = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
            const date  = u.fecha_lanzamiento ? new Date(u.fecha_lanzamiento).toLocaleDateString('es-ES') : '—';
            const kills = u.kills || '—';
            const foto  = u.foto_perfil;
            const avatar = foto
                ? `<img class="avatar" src="${escHtml(foto)}" alt="avatar" onerror="this.outerHTML='<div class=\\'avatar-placeholder\\'>👤</div>'">`
                : `<div class="avatar-placeholder">👤</div>`;
 
            return `<tr>
                <td><span class="rank-num ${cls}">${rank}</span></td>
                <td>${avatar}</td>
                <td>${escHtml(u.username)}</td>
                <td><span class="puntos-val">${u.puntos ?? '—'}</span></td>
                <td><span class="kills-badge">${escHtml(String(kills))}</span></td>
                <td style="color:var(--muted);font-size:.85rem">${date}</td>
                <td>
                    <button class="action-btn" onclick='openEdit(${JSON.stringify(JSON.stringify(u))})'>Editar</button>
                    <button class="action-btn del" onclick="deleteUser('${u._id}','${escHtml(u.username)}')">Borrar</button>
                </td>
            </tr>`;
        }).join('');
 
        setTbody(rows);
    }
 
    function setTbody(html) {
        document.getElementById('user-tbody').innerHTML = html;
    }
 
    // ─── STATS ───────────────────────────────────────────────────
    function updateStats() {
        const total   = allUsers.length;
        const kills   = allUsers.reduce((a, u) => a + (parseInt(u.kills) || 0), 0);
        const maxPts  = allUsers.length ? Math.max(...allUsers.map(u => u.puntos || 0)) : 0;
        const top     = allUsers.sort((a,b) => (b.puntos||0)-(a.puntos||0))[0];
 
        document.getElementById('v-total').textContent = total;
        document.getElementById('v-kills').textContent = kills;
        document.getElementById('v-pts').textContent   = maxPts;
        document.getElementById('v-top').textContent   = top ? top.username : '—';
 
        ['s-total','s-kills','s-pts','s-top'].forEach((id, i) => {
            setTimeout(() => document.getElementById(id).classList.add('visible'), i * 80);
        });
    }
 
    // ─── SORT ────────────────────────────────────────────────────
    function sortBy(field) {
        if (sortField === field) sortAsc = !sortAsc;
        else { sortField = field; sortAsc = false; }
        document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
        event.currentTarget.classList.add('sorted');
        renderTable();
    }
 
    function sortUsers(arr) {
        return [...arr].sort((a, b) => {
            let va, vb;
            if (sortField === 'puntos')   { va = a.puntos||0;       vb = b.puntos||0; }
            else if (sortField === 'kills')    { va = parseInt(a.kills)||0; vb = parseInt(b.kills)||0; }
            else if (sortField === 'username') { va = a.username||'';  vb = b.username||''; }
            else if (sortField === 'fecha')    { va = new Date(a.fecha_lanzamiento||0); vb = new Date(b.fecha_lanzamiento||0); }
            else return 0;
            return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
        });
    }
 
    // ─── MODAL ───────────────────────────────────────────────────
    function openModal() {
        editingId = null;
        document.getElementById('modal-title').textContent = 'Nuevo Jugador';
        document.getElementById('modal-save-btn').textContent = 'Guardar';
        ['f-username','f-password','f-puntos','f-kills','f-foto'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('modal-overlay').classList.add('open');
    }
 
    function openEdit(jsonStr) {
        const u = JSON.parse(jsonStr);
        editingId = u._id;
        document.getElementById('modal-title').textContent = 'Editar Jugador';
        document.getElementById('modal-save-btn').textContent = 'Actualizar';
        document.getElementById('f-username').value = u.username || '';
        document.getElementById('f-password').value = '';
        document.getElementById('f-puntos').value   = u.puntos ?? '';
        document.getElementById('f-kills').value    = u.kills || '';
        document.getElementById('f-foto').value     = u.foto_perfil || '';
        document.getElementById('modal-overlay').classList.add('open');
    }
 
    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('open');
    }
 
    function closeModalOutside(e) {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
    }
 
    // ─── SAVE ────────────────────────────────────────────────────
    async function saveUser() {
        const username = document.getElementById('f-username').value.trim();
        const password = document.getElementById('f-password').value.trim();
        const puntos   = document.getElementById('f-puntos').value.trim();
        const kills    = document.getElementById('f-kills').value.trim();
        const foto     = document.getElementById('f-foto').value.trim();
 
        if (!username) { showToast('El username es obligatorio', true); return; }
        if (!editingId && !password) { showToast('La contraseña es obligatoria', true); return; }
        if (!editingId && puntos === '') { showToast('Los puntos son obligatorios', true); return; }
 
        const body = { username, kills, foto_perfil: foto };
        if (puntos !== '') body.puntos = Number(puntos);
        if (password)      body.password = password;
 
        try {
            const url    = editingId ? `${API}/users/${editingId}` : `${API}/users`;
            const method = editingId ? 'PUT' : 'POST';
            const res    = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const json = await res.json();
            if (!res.ok) { showToast(json.message || 'Error al guardar', true); return; }
            showToast(editingId ? 'Jugador actualizado ✓' : 'Jugador creado ✓');
            closeModal();
            loadUsers();
        } catch (e) {
            showToast('Error de conexión', true);
        }
    }
 
    // ─── DELETE ──────────────────────────────────────────────────
    async function deleteUser(id, name) {
        if (!confirm(`¿Borrar al jugador "${name}"?`)) return;
        try {
            const res = await fetch(`${API}/users/${id}`, { method: 'DELETE' });
            if (!res.ok) { showToast('Error al borrar', true); return; }
            showToast(`${name} eliminado`);
            loadUsers();
        } catch (e) {
            showToast('Error de conexión', true);
        }
    }
 
    // ─── HELPERS ─────────────────────────────────────────────────
    function setApiStatus(ok) {
        document.getElementById('dot').className = 'dot ' + (ok ? 'online' : 'offline');
        document.getElementById('api-status').textContent = ok ? 'API conectada' : 'API offline';
    }
 
    function showToast(msg, error = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className   = 'show' + (error ? ' error' : '');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.className = '', 3000);
    }
 
    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
 
    // ─── SEARCH ──────────────────────────────────────────────────
    document.getElementById('search').addEventListener('input', renderTable);
 
    // ─── INIT ────────────────────────────────────────────────────
    loadUsers();
</script>
</body>
</html>
