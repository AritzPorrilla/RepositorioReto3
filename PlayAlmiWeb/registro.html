<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>PlayAlmi | Registro Zombie</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Chakra+Petch:wght@400;500;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
	<div class="fog fog-a" aria-hidden="true"></div>
	<div class="fog fog-b" aria-hidden="true"></div>

	<main class="layout">
		<section class="hero panel reveal">
			<p class="eyebrow">Night Event - New Survivor</p>
			<h1>Acceso de Jugadores</h1>
			<p class="subtitle">Esta es la pagina de entrada: registrate o inicia sesion para pasar al ranking.</p>
			<p class="status" id="status-registro">Listo para continuar</p>
		</section>

		<section class="panel reveal delay-1 forms-grid">
			<div>
				<h2>Registro</h2>
				<form id="form-registro" class="form">
					<label for="username">Usuario</label>
					<input id="username" name="username" type="text" minlength="3" required />

					<label for="password">Password</label>
					<input id="password" name="password" type="password" minlength="4" required />

					<button type="submit">Registrarme</button>
				</form>
			</div>

			<div>
				<h2>Iniciar sesion</h2>
				<form id="form-login" class="form">
					<label for="login-username">Usuario</label>
					<input id="login-username" name="login-username" type="text" minlength="3" required />

					<label for="login-password">Password</label>
					<input id="login-password" name="login-password" type="password" minlength="4" required />

					<button type="submit">Entrar al ranking</button>
				</form>
			</div>

			<p id="feedback-registro" class="feedback" style="display:none;"></p>
		</section>
	</main>

	<footer class="panel" style="width:min(1100px,94vw); margin:0 auto 1.2rem; display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
		<span>Destino de registro: <code>/api/users (POST)</code></span>
		<span>Despues de entrar te llevamos al ranking automaticamente</span>
	</footer>

	<script src="./js/registroUser.js"></script>
</body>
</html>
